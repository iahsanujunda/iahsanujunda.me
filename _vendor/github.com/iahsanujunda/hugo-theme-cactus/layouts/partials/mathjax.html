{{- /* MathJax (§9) — extracted from head.ejs (was inline). MathJax v4. */ -}}
{{- with .Site.Params.mathjax -}}
{{- if .enabled -}}
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$']]
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js" async></script>
{{- end -}}
{{- end -}}
