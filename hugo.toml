baseURL = 'https://iahsanujunda.me/'
locale = 'en-us'
title = 'Izzuddin Ahsanujunda'

[params]
  author = "Junda"
  description = "Learn something, write them down!"
  dateFormat = "2 Jan 2006"
  direction = "ltr"
  projectsUrl = "http://github.com/iahsanujunda"

  # Look & feel (injected into Sass via css.Sass `vars` — §6)
  colorscheme = "dark"
  rss = true

  [params.logo]
    enabled = true
    width = 50
    height = 50
    url = "/images/logo.png"
    gravatar = false
    grayout = true

  [params.favicon]
    [params.favicon.desktop]
      url = "/images/favicon.ico"
    [params.favicon.android]
      url = "/images/favicon-192x192.png"
    [params.favicon.apple]
      url = "/images/apple-touch-icon.png"

  [params.tagsOverview]
    enabled = false
  [params.postsOverview]
    showAllPosts = false
    postCount = 8
    sortUpdated = false
  [params.archive]
    sortUpdated = false
  [params.post]
    showUpdated = false

  [params.copyright]
    startYear = 2016
    # endYear =                     # blank → current year

  [params.error404]
    enabled = true
    title = "404 Page Not Found"
    description = "The page you are looking for might have been removed, had its name changed, or is temporarily unavailable."

  # Plugins / integrations
  [params.mathjax]
    enabled = true

  [params.cdn]
    enable = true
    fontAwesome = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"

  # Social links — Hexo `social_links` array → array-of-tables.
  [[params.socialLinks]]
    icon = "github"
    link = "https://github.com/iahsanujunda"
  [[params.socialLinks]]
    icon = "mail"
    link = "mailto:izzuddin.ahsanujunda@gmail.com"

[menus]
  [[menus.main]]
    name = "home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "about"
    url = "/about/"
    weight = 2
  [[menus.main]]
    name = "articles"
    url = "/posts/"
    weight = 3
  [[menus.main]]
    name = "search"
    url = "/search/"
    weight = 4

[permalinks]
  posts = "/:year/:month/:day/:slug/"  # match your existing Hexo URLs

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[module]
  [[module.imports]]
    path = "github.com/iahsanujunda/hugo-theme-cactus"
